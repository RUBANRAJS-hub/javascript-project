<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(22, 30, 49, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --primary-glow: rgba(6, 182, 212, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .qr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
    }

    .form-input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 0.85rem 1rem;
      outline: none;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .qr-result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      margin-top: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      animation: fadeIn 0.4s ease-out;
    }

    .qr-result.active {
      display: flex;
    }

    .qr-img-wrapper {
      background: white;
      padding: 1rem;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-img {
      max-width: 100%;
      height: auto;
    }

    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 1.5rem auto 0 auto;
    }

    .loader.active {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">← Back to Hub</a>

  <div class="container">
    <header>
      <h1>QR Code Generator</h1>
      <p style="color: var(--text-muted); margin-top: 0.25rem;">Generate high-quality QR codes instantly</p>
    </header>

    <div class="qr-card">
      <div class="form-group">
        <label for="qrInput">Link or Text</label>
        <input type="text" class="form-input" id="qrInput" placeholder="https://example.com" value="https://google.com">
      </div>

      <button class="btn" id="generateBtn">Generate QR Code</button>

      <div class="loader" id="loader"></div>

      <div class="qr-result" id="qrResult">
        <div class="qr-img-wrapper">
          <img src="" alt="QR Code" class="qr-img" id="qrImg">
        </div>
        <button class="btn" id="downloadBtn" style="background: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);">Download Image</button>
      </div>
    </div>
  </div>

  <script>
    const qrInput = document.getElementById('qrInput');
    const generateBtn = document.getElementById('generateBtn');
    const loader = document.getElementById('loader');
    const qrResult = document.getElementById('qrResult');
    const qrImg = document.getElementById('qrImg');
    const downloadBtn = document.getElementById('downloadBtn');

    generateBtn.addEventListener('click', () => {
      const text = qrInput.value.trim();
      if (!text) {
        alert("Please enter some text or link!");
        return;
      }

      // Hide previous result and show loader
      qrResult.classList.remove('active');
      loader.classList.add('active');

      const size = 250;
      const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;

      qrImg.onload = () => {
        loader.classList.remove('active');
        qrResult.classList.add('active');
      };

      qrImg.onerror = () => {
        loader.classList.remove('active');
        alert("Failed to load QR Code. Please check internet connection.");
      };

      // Trigger load
      qrImg.src = apiUrl;
    });

    downloadBtn.addEventListener('click', async () => {
      try {
        const response = await fetch(qrImg.src);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'qrcode.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        alert("Unable to download image directly. Right click/long press the QR code to save.");
      }
    });
  </script>
</body>
</html>
