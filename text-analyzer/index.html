<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Analyzer & Reader</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #10b981;
      --primary-hover: #059669;
      --primary-glow: rgba(16, 185, 129, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }

    .input-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    textarea {
      width: 100%;
      height: 280px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 1rem;
      font-size: 1.05rem;
      line-height: 1.5;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.2s;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }

    .reader-controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Stats Panel */
    .stats-panel {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      text-align: left;
      backdrop-filter: blur(16px);
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .keywords-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      text-align: left;
      backdrop-filter: blur(16px);
    }

    .keywords-card h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .keyword-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
    }

    .keyword-name {
      font-weight: 600;
    }

    .keyword-count {
      color: var(--primary);
      font-weight: 700;
    }

    .back-btn {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">← Back to Hub</a>

  <div class="container">
    <header>
      <h1>Text Analyzer & Reader</h1>
      <p style="color: var(--text-muted); margin-top: 0.25rem;">Live analysis of text length, reading statistics, and voice reading</p>
    </header>

    <div class="workspace">
      <div class="input-section">
        <textarea id="textInput" placeholder="Type or paste your text here to begin analysis..."></textarea>
        
        <div class="reader-controls">
          <button class="btn" id="playBtn">🔊 Speak Text</button>
          <button class="btn btn-secondary" id="stopBtn">⏹ Stop</button>
          <select id="voiceSelect" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem; border-radius: 8px; font-size: 0.85rem; outline: none; flex-grow: 1; max-width: 250px;">
            <!-- Voices loaded dynamically -->
          </select>
        </div>
      </div>

      <div class="stats-panel">
        <div class="stat-card">
          <div class="stat-value" id="wordCount">0</div>
          <div class="stat-label">Words</div>
        </div>

        <div class="stat-card">
          <div class="stat-value" id="charCount">0</div>
          <div class="stat-label">Characters</div>
        </div>

        <div class="stat-card">
          <div class="stat-value" id="readTime">0m 0s</div>
          <div class="stat-label">Est. Read Time</div>
        </div>

        <div class="keywords-card">
          <h3>Top Keywords</h3>
          <div id="keywordsList">
            <span style="color: var(--text-muted); font-size: 0.85rem;">Type text to extract...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const textInput = document.getElementById('textInput');
    const wordCountText = document.getElementById('wordCount');
    const charCountText = document.getElementById('charCount');
    const readTimeText = document.getElementById('readTime');
    const keywordsList = document.getElementById('keywordsList');
    
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const voiceSelect = document.getElementById('voiceSelect');

    let voices = [];
    const synth = window.speechSynthesis;

    // Load available voices
    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';
      voices.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
      });
    }

    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }
    loadVoices();

    // Text Analyzer logic
    function analyzeText() {
      const text = textInput.value;

      // Character count
      charCountText.textContent = text.length;

      // Word count
      const cleanText = text.trim().replace(/\s+/g, ' ');
      const words = cleanText === '' ? [] : cleanText.split(' ');
      wordCountText.textContent = words.length;

      // Reading Time (Avg: 200 words per minute)
      const totalSeconds = Math.round((words.length / 200) * 60);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      readTimeText.textContent = `${minutes}m ${seconds}s`;

      // Keywords Extraction
      if (words.length === 0) {
        keywordsList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">Type text to extract...</span>';
        return;
      }

      // Filter common stop words
      const stopWords = new Set(['the', 'a', 'to', 'and', 'of', 'in', 'is', 'it', 'you', 'that', 'he', 'was', 'for', 'on', 'are', 'as', 'with', 'his', 'they', 'i', 'at', 'be', 'this', 'have', 'from', 'or', 'one', 'had', 'by', 'word', 'but', 'not', 'what', 'all', 'were', 'we', 'when', 'your', 'can', 'said', 'there', 'use', 'an', 'each', 'which', 'she', 'do', 'how', 'their', 'if']);
      
      const counts = {};
      words.forEach(word => {
        const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
        if (cleanWord.length > 2 && !stopWords.has(cleanWord)) {
          counts[cleanWord] = (counts[cleanWord] || 0) + 1;
        }
      });

      // Sort
      const sorted = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);

      if (sorted.length === 0) {
        keywordsList.innerHTML = '<span style="color: var(--text-muted); font-size: 0.85rem;">None found.</span>';
      } else {
        keywordsList.innerHTML = sorted.map(item => `
          <div class="keyword-item">
            <span class="keyword-name">${item[0]}</span>
            <span class="keyword-count">${item[1]}</span>
          </div>
        `).join('');
      }
    }

    textInput.addEventListener('input', analyzeText);

    // Speak text logic
    playBtn.addEventListener('click', () => {
      if (synth.speaking) {
        synth.cancel();
      }

      const text = textInput.value.trim();
      if (!text) {
        alert("Please enter some text to speak!");
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      if (voices.length > 0) {
        utterance.voice = voices[voiceSelect.value];
      }

      synth.speak(utterance);
    });

    stopBtn.addEventListener('click', () => {
      synth.cancel();
    });
  </script>
</body>
</html>
