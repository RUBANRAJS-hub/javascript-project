<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="320" style="background:#090d16; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
  <!-- SVG styling with CSS 3D transform animations -->
  <style>
    .grid {
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
    }
    
    .glow-circle {
      fill: none;
      stroke: url(#cyan-purple-grad);
      stroke-width: 1.5;
      stroke-dasharray: 4 8;
      transform-origin: 200px 200px;
      animation: spin-clockwise 20s infinite linear;
    }

    .cube-container {
      perspective: 800px;
      transform-style: preserve-3d;
      transform-origin: 200px 200px;
    }

    .cube {
      transform-origin: 200px 200px;
      transform-style: preserve-3d;
      animation: rotate-cube 10s infinite linear;
    }

    /* SVG face styling */
    .face {
      position: absolute;
      fill: rgba(99, 102, 241, 0.08);
      stroke: url(#neon-glow-grad);
      stroke-width: 2.5;
      stroke-linejoin: round;
    }

    /* Core light pulse */
    .core-node {
      fill: #fb7185;
      filter: drop-shadow(0 0 15px rgba(251, 113, 133, 0.8));
      transform-origin: 200px 200px;
      animation: pulse-core 2s infinite ease-in-out;
    }

    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes rotate-cube {
      0% {
        transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }
      100% {
        transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
      }
    }

    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }
  </style>

  <!-- Definitions for neon gradients -->
  <defs>
    <linearGradient id="neon-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="cyan-purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <!-- Background Matrix grid lines -->
  <line x1="50" y1="200" x2="350" y2="200" class="grid" />
  <line x1="200" y1="50" x2="200" y2="350" class="grid" />
  <line x1="90" y1="90" x2="310" y2="310" class="grid" />
  <line x1="310" y1="90" x2="90" y2="310" class="grid" />

  <!-- Outer spinning orbit -->
  <circle cx="200" cy="200" r="140" class="glow-circle" />

  <!-- Core pulsating light -->
  <circle cx="200" cy="200" r="12" class="core-node" />

  <!-- 3D Cube container Group -->
  <g class="cube-container">
    <g class="cube">
      <!-- We build a wireframe representation using 3D coordinate mapping -->
      <!-- Back Face -->
      <polygon points="150,150 250,150 250,250 150,250" class="face" style="stroke-opacity: 0.5;" />
      
      <!-- Connecting Vertices -->
      <line x1="120" y1="120" x2="150" y2="150" stroke="url(#neon-glow-grad)" stroke-width="2" stroke-dasharray="2 2" />
      <line x1="280" y1="120" x2="250" y2="150" stroke="url(#neon-glow-grad)" stroke-width="2" stroke-dasharray="2 2" />
      <line x1="280" y1="280" x2="250" y2="250" stroke="url(#neon-glow-grad)" stroke-width="2" stroke-dasharray="2 2" />
      <line x1="120" y1="280" x2="150" y2="250" stroke="url(#neon-glow-grad)" stroke-width="2" stroke-dasharray="2 2" />
      
      <!-- Front Face -->
      <polygon points="120,120 280,120 280,280 120,280" class="face" />
      
      <!-- Additional inner geometric structure lines -->
      <line x1="200" y1="120" x2="200" y2="280" stroke="rgba(34, 211, 238, 0.4)" stroke-width="1.5" />
      <line x1="120" y1="200" x2="280" y2="200" stroke="rgba(34, 211, 238, 0.4)" stroke-width="1.5" />
    </g>
  </g>
</svg>
