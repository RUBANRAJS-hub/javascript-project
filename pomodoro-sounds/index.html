<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro & Ambient Sounds</title>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(22, 30, 49, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --primary: #fb7185;
      --primary-hover: #f43f5e;
      --primary-glow: rgba(251, 113, 133, 0.35);
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(at 0% 100%, rgba(251, 113, 133, 0.05) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .pomodoro-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .modes {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.4rem;
      border-radius: 9999px;
      margin-bottom: 2rem;
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.6rem 1.25rem;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .timer-display {
      font-size: 5.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #fff 40%, #fdba74 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .btn {
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Ambient Sounds Grid */
    .sounds-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .sounds-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--accent);
      text-align: left;
    }

    .sounds-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sound-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .sound-label {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .sound-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sound-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .sound-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    }

    .volume-slider {
      width: 80px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .back-btn {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">← Back to Hub</a>

  <div class="container">
    <div class="pomodoro-card">
      <div class="modes">
        <button class="mode-btn active" data-time="1500" id="btn-focus">Focus</button>
        <button class="mode-btn" data-time="300" id="btn-short">Short Break</button>
        <button class="mode-btn" data-time="900" id="btn-long">Long Break</button>
      </div>

      <div class="timer-display" id="timer">25:00</div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="sounds-card">
      <h3>Ambient Focus Helper</h3>
      <div class="sounds-grid">
        <!-- Rain sound -->
        <div class="sound-row">
          <span class="sound-label">🌧️ Rain Shower</span>
          <div class="sound-controls">
            <input type="range" class="volume-slider" id="rainVolume" min="0" max="1" step="0.1" value="0.5">
            <button class="sound-btn" id="rainBtn">▶</button>
          </div>
        </div>
        <!-- Ocean sound -->
        <div class="sound-row">
          <span class="sound-label">🌊 Ocean Waves</span>
          <div class="sound-controls">
            <input type="range" class="volume-slider" id="oceanVolume" min="0" max="1" step="0.1" value="0.5">
            <button class="sound-btn" id="oceanBtn">▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let timeLeft = 1500; // default 25 min
    let isRunning = false;

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const modeButtons = document.querySelectorAll('.mode-btn');

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      if (isRunning) {
        clearInterval(timerInterval);
        startBtn.textContent = 'Start';
        isRunning = false;
      } else {
        isRunning = true;
        startBtn.textContent = 'Pause';
        timerInterval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
          } else {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = 'Start';
            playNotificationBell();
            alert('Timer finished!');
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      startBtn.textContent = 'Start';
      const activeMode = document.querySelector('.mode-btn.active');
      timeLeft = parseInt(activeMode.dataset.time);
      updateDisplay();
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        timeLeft = parseInt(btn.dataset.time);
        resetTimer();
      });
    });

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    // Audio context for synthesizing audio
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    // Synthesize Bell Sound
    function playNotificationBell() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
        osc.start();
        osc.stop(ctx.currentTime + 1);
      } catch (e) {}
    }

    // Noise Generator Helper
    function createNoiseNode(type) {
      const ctx = getAudioCtx();
      const bufferSize = 2 * ctx.sampleRate;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      
      let lastOut = 0.0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        if (type === 'brown') {
          // Brown noise formula
          output[i] = (lastOut + (0.02 * white)) / 1.02;
          lastOut = output[i];
          output[i] *= 3.5; // compensation gain
        } else {
          // Pink/Rain filter approximation
          output[i] = (lastOut + (0.12 * white)) / 1.12;
          lastOut = output[i];
          output[i] *= 2.0;
        }
      }
      
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;
      noise.loop = true;
      return noise;
    }

    // Rain synthesis sound
    let rainSource = null;
    let rainGain = null;
    const rainBtn = document.getElementById('rainBtn');
    const rainVol = document.getElementById('rainVolume');

    rainBtn.addEventListener('click', () => {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();

      if (rainSource) {
        rainSource.stop();
        rainSource = null;
        rainBtn.textContent = '▶';
        rainBtn.classList.remove('active');
      } else {
        rainSource = createNoiseNode('pink');
        rainGain = ctx.createGain();
        rainGain.gain.setValueAtTime(parseFloat(rainVol.value), ctx.currentTime);
        
        // Dynamic rain filter (low-pass filter to sound muffled and wet)
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1000;
        
        rainSource.connect(filter);
        filter.connect(rainGain);
        rainGain.connect(ctx.destination);
        
        rainSource.start();
        rainBtn.textContent = '■';
        rainBtn.classList.add('active');
      }
    });

    rainVol.addEventListener('input', () => {
      if (rainGain) {
        rainGain.gain.setValueAtTime(parseFloat(rainVol.value), getAudioCtx().currentTime);
      }
    });

    // Ocean Waves synthesis
    let oceanSource = null;
    let oceanGain = null;
    let waveLfo = null;
    const oceanBtn = document.getElementById('oceanBtn');
    const oceanVol = document.getElementById('oceanVolume');

    oceanBtn.addEventListener('click', () => {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();

      if (oceanSource) {
        oceanSource.stop();
        waveLfo.stop();
        oceanSource = null;
        oceanBtn.textContent = '▶';
        oceanBtn.classList.remove('active');
      } else {
        oceanSource = createNoiseNode('brown');
        oceanGain = ctx.createGain();
        oceanGain.gain.setValueAtTime(parseFloat(oceanVol.value), ctx.currentTime);
        
        // Filter for waves
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        
        // Low Frequency Oscillator (LFO) to simulate swelling ocean waves
        waveLfo = ctx.createOscillator();
        waveLfo.frequency.value = 0.08; // wave cycle ~12 seconds
        
        const lfoGain = ctx.createGain();
        lfoGain.gain.value = 250; // swing filter from 150Hz to 650Hz
        
        waveLfo.connect(lfoGain);
        lfoGain.connect(filter.frequency);
        
        oceanSource.connect(filter);
        filter.connect(oceanGain);
        oceanGain.connect(ctx.destination);
        
        waveLfo.start();
        oceanSource.start();
        oceanBtn.textContent = '■';
        oceanBtn.classList.add('active');
      }
    });

    oceanVol.addEventListener('input', () => {
      if (oceanGain) {
        oceanGain.gain.setValueAtTime(parseFloat(oceanVol.value), getAudioCtx().currentTime);
      }
    });
  </script>
</body>
</html>
