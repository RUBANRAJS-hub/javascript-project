<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruban JS Projects Hub</title>
  <meta name="description" content="A premium showcase and hub for 20+ mini-projects built with Vanilla JavaScript, HTML5, and CSS3.">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --glow: rgba(99, 102, 241, 0.15);
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
        radial-gradient(at 50% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 2rem 1.5rem 4rem 1.5rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Styles */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
    }

    header p {
      font-size: 1.125rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 2rem auto;
      line-height: 1.6;
    }

    /* Controls: Search and Filters */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    .search-input {
      width: 100%;
      padding: 1rem 1.5rem 1rem 3rem;
      border-radius: 9999px;
      border: 1px solid var(--card-border);
      background: rgba(17, 24, 39, 0.6);
      color: var(--text-main);
      font-size: 1rem;
      font-family: var(--font-family);
      outline: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--glow), 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      width: 18px;
      height: 18px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .filter-btn {
      background: rgba(17, 24, 39, 0.4);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    /* Grid Layout */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease-out 0.2s forwards;
    }

    /* Card Design */
    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      backdrop-filter: blur(16px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), transparent 40%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(99, 102, 241, 0.1);
    }

    .project-card:hover::before {
      opacity: 1;
    }

    .card-content {
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      z-index: 1;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .project-index {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      transition: all 0.3s ease;
    }

    .project-card:hover .card-icon {
      background: var(--primary);
      color: white;
      transform: scale(1.05);
    }

    .project-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .project-description {
      font-size: 0.925rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 1.5rem;
      flex-grow: 1;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .project-tag {
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .card-footer {
      display: flex;
      gap: 0.75rem;
      margin-top: auto;
    }

    .launch-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.25);
    }

    .launch-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      text-decoration: none;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    .github-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Animation Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 1.1rem;
      display: none;
    }

    .empty-state.visible {
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2.25rem; }
      body { padding: 1.5rem 1rem 3rem 1rem; }
      .controls { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="projects-grid" id="projectsGrid">
      <!-- Project cards will be dynamically loaded here for ease of maintenance and filtering -->
    </div>

    <div class="empty-state" id="emptyState">
      No projects match your search or filter selection. Try another query!

    const projectsGrid = document.getElementById("projectsGrid");
    const searchInput = document.getElementById("searchInput");
    const filtersContainer = document.getElementById("filtersContainer");
    const emptyState = document.getElementById("emptyState");

    let currentFilter = "all";
    let searchQuery = "";

    // Generate project cards
    function renderProjects() {
      projectsGrid.innerHTML = "";
      
      const filtered = projects.filter(project => {
        const matchesFilter = currentFilter === "all" || project.categories.includes(currentFilter);
        const matchesSearch = project.title.toLowerCase().includes(searchQuery) ||
                              project.description.toLowerCase().includes(searchQuery) ||
                              project.tags.some(tag => tag.toLowerCase().includes(searchQuery));
        return matchesFilter && matchesSearch;
      });

      if (filtered.length === 0) {
        emptyState.classList.add("visible");
      } else {
        emptyState.classList.remove("visible");
      }

      filtered.forEach((p, index) => {
        const card = document.createElement("div");
        card.className = "project-card";
        card.id = `card-${p.dir}`;
        
        // Define representative SVG icons
        let iconSvg = '';
        if (p.categories.includes("game")) {
          iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/></svg>`;
        } else if (p.categories.includes("media")) {
          iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;
        } else if (p.categories.includes("api")) {
          iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="12" y1="2" x2="12" y2="22"/></svg>`;
        } else if (p.categories.includes("utility")) {
          iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;
        } else {
          iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`;
        }

        const tagsHtml = p.tags.map(t => `<span class="project-tag">${t}</span>`).join('');

        card.innerHTML = `
          <div class="card-content">
            <div class="card-header">
              <span class="project-index">Project ${p.id}</span>
              <div class="card-icon">${iconSvg}</div>
            </div>
            <h3 class="project-title">${p.title}</h3>
            <p class="project-description">${p.description}</p>
            <div class="tags-container">${tagsHtml}</div>
            <div class="card-footer">
              <a href="${p.dir}/index.html" class="launch-btn" target="_blank" id="btn-launch-${p.dir}">
                Launch App
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
            </div>
          </div>
        `;
        projectsGrid.appendChild(card);
      });
    }

    // Event listener for search
    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      renderProjects();
    });

    // Event listener for filters
    filtersContainer.addEventListener("click", (e) => {
      if (e.target.classList.contains("filter-btn")) {
        // Toggle active class
        document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
        e.target.classList.add("active");
        
        currentFilter = e.target.getAttribute("data-filter");
        renderProjects();
      }
    });

    // Initial render
    renderProjects();
  </script>
</body>
</html>
